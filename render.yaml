# Render Blueprint Specification for Robotics Club Backend (Monorepo Setup)
# Docs: https://render.com/docs/blueprints

services:
  - type: web
    name: robotics-backend
    runtime: python
    rootDirectory: backend  # Directs Render to build and run inside the backend folder
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8 # Reliable and modern Python runtime version
      
      # Auto-generate a secure random 256-bit hex secret key for JWT session signing
      - key: SECRET_KEY
        generateValue: true

      # Wire the backend automatically to the PostgreSQL database provisioned below
      - key: DATABASE_URL
        fromDatabase:
          name: robotics-db
          property: connectionString

      # CORS Configuration: Comma-separated list of allowed frontend origins.
      # You should update this to your production Vercel frontend URL once deployed.
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://localhost:3000

      # Admin Seed Configuration (seeks database default values if missing)
      - key: ADMIN_EMAIL
        value: admin@robotics.club
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: Admin

      # Optional Email Deliverability Keys (strongly recommended on Render)
      # SMTP port blocks are common on cloud platforms, so HTTPS API is preferred.
      - key: BREVO_API_KEY
        sync: false # Set in Render Dashboard -> Environment Variables
      - key: RESEND_API_KEY
        sync: false # Set in Render Dashboard -> Environment Variables

databases:
  - name: robotics-db
    databaseName: robotics
    user: robotics_user
    plan: free # Change to standard if you require non-expiring production storage
